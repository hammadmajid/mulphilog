name: Test

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm fmt:check

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:run

      - name: Run coverage
        run: pnpm test:coverage
