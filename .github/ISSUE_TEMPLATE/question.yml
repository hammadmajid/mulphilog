name: Question
description: Ask a question about usage or implementation
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help! Please provide as much detail as possible.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish?
      placeholder: I'm trying to...

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: If applicable, show what you've tried so far.
      placeholder: |
        ```typescript
        // Your code here
        ```
      render: typescript

  - type: input
    id: version
    attributes:
      label: Package Version
      description: Which version of mulphilog are you using?
      placeholder: e.g., 0.2.1

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the README and documentation
          required: true
        - label: I have searched existing issues for similar questions
          required: true
